<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Usuarios</title>
    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <!-- Tailwind (CDN de desarrollo; suficiente para el ejercicio) -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div class="container py-4">
      <div class="row">
        <div class="col-6">Lista de Usuarios</div>
        <div class="col-6">Acciones</div>
      </div>

      <div class="mt-3 d-flex flex-wrap gap-2 align-items-center">
        <button type="button" class="btn btn-primary btn-lg">
          Crear Usuario
        </button>

        <button
          type="button"
          class="bg-blue-500 text-white px-4 py-2 rounded border-0"
        >
          Botón Tailwind
        </button>
      </div>

      <div class="mt-3 bg-red-500 text-white px-3 py-2 rounded">
        Mensaje de error
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
