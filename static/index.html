<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Usuarios</title>
    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <!-- Tailwind (CDN de desarrollo; suficiente para el ejercicio) -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div class="container py-4">
      <h1 class="h4 mb-4">Gestión de Usuarios</h1>

      <div
        id="mensaje-error"
        class="alert alert-danger d-none"
        role="alert"
      ></div>
      <div
        id="mensaje-exito"
        class="alert alert-success d-none"
        role="alert"
      ></div>

      <div class="card mb-4">
        <div class="card-header">Crear usuario</div>
        <div class="card-body">
          <form id="form-usuario" class="row g-3">
            <div class="col-md-4">
              <label for="nombre" class="form-label">Nombre</label>
              <input
                type="text"
                class="form-control"
                id="nombre"
                name="nombre"
                required
                autocomplete="name"
              />
              <div class="form-text">No puede ser solo números.</div>
            </div>
            <div class="col-md-4">
              <label for="email" class="form-label">Correo</label>
              <input
                type="email"
                class="form-control"
                id="email"
                name="email"
                required
                autocomplete="email"
              />
            </div>
            <div class="col-md-2">
              <label for="edad" class="form-label">Edad</label>
              <input
                type="number"
                class="form-control"
                id="edad"
                name="edad"
                min="0"
                max="130"
                required
              />
            </div>
            <div class="col-md-2 d-flex align-items-end">
              <button type="submit" class="btn btn-primary w-100">
                Guardar
              </button>
            </div>
          </form>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-2">
        <h2 class="h5 mb-0">Lista de usuarios</h2>
        <button
          type="button"
          id="btn-actualizar"
          class="bg-blue-500 text-white px-3 py-2 rounded border-0 small"
        >
          Actualizar
        </button>
      </div>

      <div class="table-responsive">
        <table class="table table-striped table-bordered align-middle">
          <thead class="table-light">
            <tr>
              <th scope="col">Id</th>
              <th scope="col">Nombre</th>
              <th scope="col">Correo</th>
              <th scope="col">Edad</th>
            </tr>
          </thead>
          <tbody id="lista-usuarios">
            <tr id="fila-vacia">
              <td colspan="4" class="text-muted text-center">
                Cargando…
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      const elError = document.getElementById("mensaje-error");
      const elExito = document.getElementById("mensaje-exito");
      const tbody = document.getElementById("lista-usuarios");
      const form = document.getElementById("form-usuario");

      function ocultarMensajes() {
        elError.classList.add("d-none");
        elExito.classList.add("d-none");
        elError.textContent = "";
        elExito.textContent = "";
      }

      function mostrarError(texto) {
        ocultarMensajes();
        elError.textContent = texto;
        elError.classList.remove("d-none");
      }

      function mostrarExito(texto) {
        ocultarMensajes();
        elExito.textContent = texto;
        elExito.classList.remove("d-none");
      }

      function detalleApiAMensaje(data) {
        if (!data) return "Error desconocido";
        if (typeof data.detail === "string") return data.detail;
        if (Array.isArray(data.detail)) {
          return data.detail
            .map((d) => {
              const loc = Array.isArray(d.loc) ? d.loc.join(".") : "";
              const msg = d.msg || d.message || "";
              return loc ? `${loc}: ${msg}` : msg;
            })
            .filter(Boolean)
            .join(" · ");
        }
        return JSON.stringify(data.detail ?? data);
      }

      async function cargarUsuarios() {
        ocultarMensajes();
        tbody.innerHTML = "";
        try {
          const res = await fetch("/usuarios");
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            mostrarError(detalleApiAMensaje(data));
            tbody.innerHTML =
              '<tr><td colspan="4" class="text-center text-muted">No se pudo cargar la lista.</td></tr>';
            return;
          }
          if (!data.length) {
            tbody.innerHTML =
              '<tr><td colspan="4" class="text-center text-muted">No hay usuarios todavía.</td></tr>';
            return;
          }
          for (const u of data) {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${u.id}</td><td>${escapeHtml(u.nombre)}</td><td>${escapeHtml(u.email)}</td><td>${u.edad}</td>`;
            tbody.appendChild(tr);
          }
        } catch (e) {
          mostrarError("No se pudo conectar con el servidor.");
          tbody.innerHTML =
            '<tr><td colspan="4" class="text-center text-muted">Error de red.</td></tr>';
        }
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        ocultarMensajes();
        const nombre = document.getElementById("nombre").value;
        const email = document.getElementById("email").value;
        const edad = parseInt(document.getElementById("edad").value, 10);
        try {
          const res = await fetch("/usuarios", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ nombre, email, edad }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            mostrarError(detalleApiAMensaje(data));
            return;
          }
          mostrarExito("Usuario creado correctamente.");
          form.reset();
          await cargarUsuarios();
        } catch (err) {
          mostrarError("No se pudo conectar con el servidor.");
        }
      });

      document
        .getElementById("btn-actualizar")
        .addEventListener("click", cargarUsuarios);

      cargarUsuarios();
    </script>
  </body>
</html>
